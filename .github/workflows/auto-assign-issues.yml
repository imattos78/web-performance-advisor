name: Auto-assign Issues by Role

on:
  issues:
    types: [opened, labeled]

jobs:
  assign-by-label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign Backend Developer
        if: contains(github.event.issue.labels.*.name, 'backend-dev')
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['imattos78']
            })

      - name: Auto-assign Designer
        if: contains(github.event.issue.labels.*.name, 'designer')
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.addAssignees({
