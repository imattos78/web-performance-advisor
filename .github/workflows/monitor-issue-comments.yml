name: Monitor Issue Comments & Agent Mentions

on:
  issue_comment:
    types: [created, edited]

jobs:
  respond-to-mentions:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Check for agent mentions and respond
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const commentsResponse = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });
            const allComments = commentsResponse.data;

            function labelsToText(labels) {
              return labels.map((label) => label.name).join(', ') || 'None';
            }

            function getChecklistProgress(markdown) {
              const body = markdown || '';
              const total = (body.match(/- \[(?: |x|X)\]/g) || []).length;
              const completed = (body.match(/- \[(?:x|X)\]/g) || []).length;
              return { completed, total };
            }

            function getLinkStatus() {
              const sources = [issue.body || '', ...allComments.map((entry) => entry.body || '')].join('\n');

              return {
                hasFigma: /https?:\/\/[^\s]*figma\.com/i.test(sources),
                hasDesignDoc: /design token|wireframe|mockup|prototype|handoff/i.test(sources)
              };
            }

            function getLatestHumanComment() {
              const latest = [...allComments]
                .reverse()
                .find((entry) => {
                  const login = entry.user?.login || '';
                  return login !== 'github-actions[bot]' && login !== 'github-actions';
                });

              if (!latest) {
                return 'No prior human comments found.';
              }

              const normalized = (latest.body || '').replace(/\s+/g, ' ').trim();
              const excerpt = normalized.length > 160 ? `${normalized.slice(0, 157)}...` : normalized;
              return `@${latest.user.login}: ${excerpt}`;
            }

            const checklist = getChecklistProgress(issue.body);
            const links = getLinkStatus();
            const latestHumanComment = getLatestHumanComment();
            const baseStatus = [
              `- Current issue: #${issueNumber}`,
              `- Labels: ${labelsToText(issue.labels)}`,
              `- Assignee: ${issue.assignee?.login || 'Unassigned'}`,
              `- Checklist progress in issue body: ${checklist.completed}/${checklist.total} items checked`,
              `- Figma link present: ${links.hasFigma ? 'Yes' : 'No'}`,
              `- Design-related links or keywords present: ${links.hasDesignDoc ? 'Yes' : 'No'}`,
              `- Latest human comment: ${latestHumanComment}`
            ].join('\n');
            
            // Backend Developer mention
            if (comment.includes('@backend-agent') || comment.includes('@backend-dev')) {
              const backendResponse = `## 🔧 Backend Developer - Follow-up Response\n\nI've reviewed your message and the current issue data.\n\n**Verified Status:**\n${baseStatus}\n\n**My Response:**\nI can only confirm what is visible in the issue thread from this workflow. No implementation progress is inferred unless it is documented in the issue.\n\n**Next Actions:**\n1. Confirm backend scope and acceptance criteria in the issue\n2. Link any active PR or branch if work has started\n3. Call out blockers or dependencies explicitly\n4. Update the issue checklist as implementation progresses\n\nLet me know if you need a more specific backend status check. 💬`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: backendResponse
              });
            }
            
            // Frontend Developer mention
            if (comment.includes('@frontend-agent') || comment.includes('@frontend-dev')) {
              const frontendResponse = `## 🖥️ Frontend Developer - Follow-up Response\n\nI've reviewed your message and the current issue data.\n\n**Verified Status:**\n${baseStatus}\n\n**My Response:**\nI can confirm issue metadata and discussion state, but I am not assuming design handoff or implementation progress unless it is linked in the thread.\n\n**Next Actions:**\n1. Link the approved design source if it exists\n2. Link any implementation PR or branch\n3. Note which screens or components are in progress\n4. Update the issue checklist to reflect actual shipped work\n\nLet me know if you need a more specific frontend status check. 💬`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: frontendResponse
              });
            }
            
            // Designer mention
            if (comment.includes('@designer-agent') || comment.includes('@designer')) {
              const designerResponse = `## 🎨 Designer - Follow-up Response\n\nI've reviewed your message and the current issue data.\n\n**Verified Status:**\n${baseStatus}\n\n**My Response:**\nThis workflow now reports only verifiable status. I can confirm issue metadata, checklist progress, discussion history, and whether a Figma link is present. I am not claiming wireframes, mockups, tokens, or handoff progress unless those artifacts are linked or checked off in the issue.\n\n**Current Design Signals:**\n- Day-by-day progress must be inferred from checklist items or linked artifacts\n- Figma/design workspace is ${links.hasFigma ? 'linked in the issue thread' : 'not currently linked in the issue thread'}\n- Deliverable completion cannot be confirmed beyond the checked items count above\n\n**Recommended Next Actions:**\n1. Share the Figma or design workspace link in the issue\n2. Mark completed deliverables directly in the issue checklist\n3. Add a brief daily update with completed screens, blockers, and next milestone\n4. Link any handoff docs or token exports once available\n\nPlease let me know what you need! 🎨`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: designerResponse
              });
            }
            
            // QA Tester mention
            if (comment.includes('@tester-agent') || comment.includes('@qa-tester')) {
              const testerResponse = `## 🧪 QA Tester - Follow-up Response\n\nI've reviewed your message and the current issue data.\n\n**Verified Status:**\n${baseStatus}\n\n**My Response:**\nI can confirm thread state, but I am not asserting test progress unless test assets, PRs, or checklist updates are linked in the issue.\n\n**Next Actions:**\n1. Link test plans, PRs, or reports if they exist\n2. State which flows are covered and which are blocked\n3. Update the issue checklist with verified testing milestones\n4. Call out any known regressions or gaps explicitly\n\nLet me know what you need! 🎯`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: testerResponse
              });
            }
            
            // Marketing mention
            if (comment.includes('@marketing-agent') || comment.includes('@marketing-seo')) {
              const marketingResponse = `## 📱 Marketing/SEO - Follow-up Response\n\nI've reviewed your message and the current issue data.\n\n**Verified Status:**\n${baseStatus}\n\n**My Response:**\nI can confirm issue metadata and linked discussion, but I am not claiming documentation or SEO progress unless artifacts are linked in the thread.\n\n**Next Actions:**\n1. Link drafts, docs, or store copy if they exist\n2. Identify missing content assets explicitly\n3. Update the issue checklist with verified documentation milestones\n4. Note blockers that depend on product or design sign-off\n\nLet me know what you need! 🚀`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: marketingResponse
              });
            }
            
            // Product Manager mention
            if (comment.includes('@product-agent') || comment.includes('@product-manager')) {
              const productResponse = `## 📊 Product Manager - Follow-up Response\n\nI've reviewed your message and the current issue data.\n\n**Verified Status:**\n${baseStatus}\n\n**My Response:**\nI can confirm issue metadata, checklist completion, and recent discussion. I am not claiming team progress beyond what is documented in the issue.\n\n**Next Actions:**\n1. Confirm blockers and dependencies in writing\n2. Update the checklist to reflect completed milestones\n3. Link active PRs, design docs, or specs from the thread\n4. Post the next milestone and target date explicitly\n\nLet me know what you need! 🎯`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: productResponse
              });
            }
