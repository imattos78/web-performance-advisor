name: Monitor Issue Comments & Agent Mentions

on:
  issue_comment:
    types: [created, edited]

jobs:
  respond-to-mentions:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Check for agent mentions and respond
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            
            // Backend Developer mention
            if (comment.includes('@backend-agent') || comment.includes('@backend-dev')) {
              const backendResponse = `## 🔧 Backend Developer - Follow-up Response\n\nI've reviewed your message and the current issue status.\n\n**Status Update:**\n- Current issue: #${issueNumber}\n- Labels: ${issue.labels.map((label) => label.name).join(', ')}\n- Assignee: ${issue.assignee?.login || 'Unassigned'}\n\n**My Response:**\nI'm ready to proceed with the next steps. Please provide any additional context or blockers.\n\n**Next Actions:**\n1. Confirm requirements clarity\n2. Identify any dependencies\n3. Create implementation branch\n4. Begin development\n\nLet me know if you need any clarification! 💬`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: backendResponse
              });
            }
            
            // Frontend Developer mention
            if (comment.includes('@frontend-agent') || comment.includes('@frontend-dev')) {
              const frontendResponse = `## 🖥️ Frontend Developer - Follow-up Response\n\nI've reviewed your message and the current issue status.\n\n**Status Update:**\n- Current issue: #${issueNumber}\n- Labels: ${issue.labels.map((label) => label.name).join(', ')}\n- Assignee: ${issue.assignee?.login || 'Unassigned'}\n\n**My Response:**\nI'm ready to proceed with component implementation. Please confirm design handoff status.\n\n**Next Actions:**\n1. Review design specifications\n2. Set up component structure\n3. Create Storybook stories\n4. Begin implementation\n\nLet me know if you need any clarification! 💬`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: frontendResponse
              });
            }
            
            // Designer mention
            if (comment.includes('@designer-agent') || comment.includes('@designer')) {
              const designerResponse = `## 🎨 Designer - Follow-up Response\n\nI've reviewed your message and the current issue status.\n\n**Status Update:**\n- Current issue: #${issueNumber}\n- Labels: ${issue.labels.map((label) => label.name).join(', ')}\n- Assignee: ${issue.assignee?.login || 'Unassigned'}\n\n**My Response:**\nThanks for reaching out! I'm tracking progress on this design task.\n\n**Current Deliverables:**\n- Discovery and requirements analysis complete\n- Wireframes and information architecture in progress\n- Design system and components pending\n- Hi-Fi mockups pending\n- Handoff documentation pending\n\n**Timeline Status:**\n- Started: To be confirmed\n- Target Completion: To be confirmed\n- Current Progress: On track or needs adjustment\n\nPlease let me know what you need! 🎨`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: designerResponse
              });
            }
            
            // QA Tester mention
            if (comment.includes('@tester-agent') || comment.includes('@qa-tester')) {
              const testerResponse = `## 🧪 QA Tester - Follow-up Response\n\nI've reviewed your message and the current issue status.\n\n**Status Update:**\n- Current issue: #${issueNumber}\n- Labels: ${issue.labels.map((label) => label.name).join(', ')}\n- Assignee: ${issue.assignee?.login || 'Unassigned'}\n\n**My Response:**\nI'm ready to proceed with testing strategy and coverage planning.\n\n**Testing Deliverables:**\n- Test strategy document pending\n- Unit tests pending\n- Integration tests pending\n- E2E tests pending\n- Coverage report pending\n\n**Next Actions:**\n1. Define test scenarios\n2. Create test cases\n3. Set up test infrastructure\n4. Begin test execution\n\nLet me know what you need! 🎯`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: testerResponse
              });
            }
            
            // Marketing mention
            if (comment.includes('@marketing-agent') || comment.includes('@marketing-seo')) {
              const marketingResponse = `## 📱 Marketing/SEO - Follow-up Response\n\nI've reviewed your message and the current issue status.\n\n**Status Update:**\n- Current issue: #${issueNumber}\n- Labels: ${issue.labels.map((label) => label.name).join(', ')}\n- Assignee: ${issue.assignee?.login || 'Unassigned'}\n\n**My Response:**\nI'm ready to create excellent documentation and content.\n\n**Documentation Deliverables:**\n- Project README pending\n- Setup guides pending\n- API documentation pending\n- User guides pending\n- SEO optimization pending\n\n**Next Actions:**\n1. Gather feature specifications\n2. Plan content structure\n3. Write initial documentation\n4. Optimize for SEO\n\nLet me know what you need! 🚀`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: marketingResponse
              });
            }
            
            // Product Manager mention
            if (comment.includes('@product-agent') || comment.includes('@product-manager')) {
              const productResponse = `## 📊 Product Manager - Follow-up Response\n\nI've reviewed your message and the current issue status.\n\n**Status Update:**\n- Current issue: #${issueNumber}\n- Labels: ${issue.labels.map((label) => label.name).join(', ')}\n- Assignee: ${issue.assignee?.login || 'Unassigned'}\n\n**My Response:**\nI'm coordinating the team and tracking progress toward our goals.\n\n**Current Tasks:**\n- Requirements definition complete\n- Team alignment in progress\n- Dependency tracking in progress\n- Progress monitoring pending\n- Stakeholder updates pending\n\n**Next Actions:**\n1. Confirm blockers and dependencies\n2. Adjust timeline if needed\n3. Prepare team sync\n4. Update roadmap\n\nLet me know what you need! 🎯`;
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: productResponse
              });
            }
